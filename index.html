<!doctype html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: "class" };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .custom-scrollbar {
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
    </style>
</head>

<body class="bg-[#dee4f0] dark:bg-slate-950 min-h-screen lg:h-screen lg:overflow-hidden flex items-center justify-center p-0 md:p-4 lg:p-6 transition-colors duration-300">
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>
    
    <div class="bg-[#f3f7ff] dark:bg-slate-900/95 w-full max-w-[1440px] min-h-screen lg:min-h-0 lg:h-[95vh] lg:max-h-[980px] lg:rounded-[20px] shadow-2xl flex flex-col lg:flex-row overflow-hidden border border-white/70 dark:border-slate-800 transition-colors">
        
        <div class="flex-1 grid grid-cols-1 xl:grid-cols-4 lg:h-full lg:overflow-hidden">
            
            <main class="xl:col-span-3 p-6 md:p-8 lg:p-10 flex flex-col gap-8 lg:h-full lg:overflow-y-auto custom-scrollbar">
                <header class="flex justify-between items-start">
                    <div>
                        <h1 id="current-time"
                            class="text-4xl font-extrabold tracking-tight text-blue-950 dark:text-white"></h1>
                        <p id="current-date"
                            class="text-xs font-bold text-slate-400 dark:text-slate-500 mt-1 uppercase tracking-wider">
                        </p>
                        <h2 class="text-xl font-bold text-blue-900/80 dark:text-slate-300 mt-3 flex items-center gap-2">
                            <span id="user-greeting">Good day!</span>
                        </h2>
                    </div>
                    <div id="dark-mode-pill"
                        class="bg-white dark:bg-slate-800 p-1 rounded-full shadow-md shadow-slate-100 dark:shadow-none flex items-center gap-1 border border-slate-100 dark:border-slate-700 cursor-pointer">
                        <button id="theme-light-btn"
                            class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs shadow-sm transition-all">
                            <i class="fa-solid fa-sun"></i>
                        </button>
                        <button id="theme-dark-btn"
                            class="w-8 h-8 rounded-full text-slate-400 dark:text-slate-500 flex items-center justify-center text-xs transition-all">
                            <i class="fa-solid fa-moon"></i>
                        </button>
                    </div>
                </header>
                <section id="error-state"
                    class="hidden bg-rose-50 dark:bg-rose-950/20 border border-rose-100 dark:border-rose-900/50 p-8 rounded-[32px] text-center flex flex-col items-center justify-center gap-4">
                    <div
                        class="w-14 h-14 bg-rose-100 dark:bg-rose-900/40 rounded-2xl flex items-center justify-center text-rose-500 text-xl">
                        <i class="fa-solid fa-circle-exclamation"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-base text-slate-800 dark:text-rose-300">
                            City location registry responseolved negative
                        </h4>
                        <p id="error-message" class="text-xs text-slate-400 dark:text-slate-500 mt-1"></p>
                    </div>
                    <button id="retry-btn"
                        class="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold rounded-xl shadow-md transition-all active:scale-95">
                        Retry Query Context
                    </button>
                </section>
                <div id="loading-skeletons" class="hidden flex-col gap-6 animate-pulse">
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="skeleton-forecast"></div>
                    <div class="h-48 bg-slate-200 dark:bg-slate-800 rounded-[32px]"></div>
                </div>
                <div id="weather-dashboard-view" class="flex-col gap-8 hidden">
                    <section>
                        <div id="forecast-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
                    </section>
                    <section id="chart-section"
                        class="bg-white dark:bg-slate-800 rounded-[32px] p-6 shadow-sm border border-slate-100 dark:border-slate-700">
                    </section>
                </div>
            </main>
            
            <aside class="bg-white/50 dark:bg-slate-900 p-6 md:p-8 flex flex-col gap-6 border-t xl:border-t-0 xl:border-l border-slate-200/60 dark:border-slate-800 transition-colors lg:h-full lg:overflow-y-auto custom-scrollbar">
                
                <div class="flex items-center gap-3 shrink-0">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input id="search-input" type="text" placeholder="Search city..."
                            class="w-full bg-white dark:bg-slate-800 pl-9 pr-4 py-2 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 border border-slate-200/60 dark:border-slate-700 transition font-medium text-slate-700 dark:text-slate-100" />
                    </div>
                    <button id="geo-btn"
                        class="w-9 h-9 bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 border border-slate-200/60 dark:border-slate-700 rounded-xl flex items-center justify-center transition active:scale-95"
                        title="Use My Location">
                        <i class="fa-solid fa-location-crosshairs"></i>
                    </button>
                    <img id="user-avatar" src="My Photos/WhatsApp Image 2025-10-13 at 2.42.48 .jpeg" alt="Avatar"
                        class="w-9 h-9 rounded-xl object-cover ring-2 ring-blue-100 dark:ring-slate-700" />
                </div>

                <section id="primary-weather-card"
                    class="shrink-0 bg-gradient-to-b from-blue-400 to-blue-600 dark:from-blue-600 dark:to-indigo-900 text-white rounded-[36px] p-6 shadow-xl shadow-blue-200 dark:shadow-none relative overflow-hidden flex flex-col justify-between min-h-[300px]">
                </section>

                <section class="flex flex-col gap-3 flex-1">
                    <h3
                        class="text-[11px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1.5">
                        <i class="fa-solid fa-heart text-rose-500"></i>
                        Favourites Registry List
                    </h3>
                    <div id="favorites-list" class="flex flex-col gap-3 pr-1"></div>
                </section>
            </aside>
        </div>
    </div>
    <script src="config.js" ></script>
    <script src="script.js" ></script>
</body>

</html>
